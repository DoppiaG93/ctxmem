version: 2
updates:
  # Keep GitHub Actions used by the CI workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "type: chore"

  # Keep Python (pip) dependencies declared in pyproject.toml up to date.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "type: chore"

name: Publish

# When you create a GitHub Release (tag like v1.4.1), this workflow:
#   1. builds the released code and publishes it to PyPI, then
#   2. opens a pull request that writes the tag version into pyproject.toml,
#      targeting the `develop` branch (nothing is pushed automatically).
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — no API token needed
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}   # build the exact released code

      - name: Derive version from the release tag
        id: ver
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"                       # strip a leading "v" if present
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([abrc.].*)?$'; then
            echo "::error::Tag '$tag' is not a valid version (expected e.g. v1.4.1)"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Write the version into pyproject.toml
        run: |
          sed -i -E "s/^version = \".*\"/version = \"${{ steps.ver.outputs.version }}\"/" pyproject.toml
          grep -E '^version = ' pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify the built artifacts carry the tag version
        run: ls dist/ | grep -F "${{ steps.ver.outputs.version }}"

      - name: Publish to PyPI
        # Uses Trusted Publishing (OIDC). Configure the publisher once at
        # https://pypi.org/manage/project/ctxmem/settings/publishing/
        # Or, to use a token instead, add:
        #   with:
        #     password: ${{ secrets.PYPI_API_TOKEN }}
        uses: pypa/gh-action-pypi-publish@release/v1

  bump-develop:
    name: Open version-bump PR against develop
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the bump branch
      pull-requests: write    # open the PR
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Write the version into pyproject.toml
        run: |
          sed -i -E "s/^version = \".*\"/version = \"${{ needs.publish.outputs.version }}\"/" pyproject.toml
          grep -E '^version = ' pyproject.toml

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          base: develop
          branch: release/bump-${{ needs.publish.outputs.version }}
          commit-message: "chore(release): set version ${{ needs.publish.outputs.version }}"
          title: "chore(release): bump version to ${{ needs.publish.outputs.version }}"
          body: |
            Automated version bump after publishing **${{ needs.publish.outputs.version }}** to PyPI.

            Merge this into `develop` to keep the version in sync with the release.
          labels: release
          delete-branch: true

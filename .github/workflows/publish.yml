name: Publish to PyPI

# When you publish a GitHub Release (tag like v1.4.3), this workflow builds the
# package from the tagged commit and uploads it to PyPI via Trusted Publishing
# (OIDC) — no API token is stored. GitHub mints a short-lived id-token that PyPI
# verifies against the trusted publisher configured for this project
# (owner/repo + this workflow filename `publish.yml` + environment `pypi`).
#
# The version is taken from pyproject.toml AT THE TAGGED COMMIT, so remember to
# bump pyproject.toml BEFORE tagging. The guard below fails fast if the tag and
# pyproject.toml disagree.
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi          # protected environment; add reviewers/branch rules on GitHub
    permissions:
      id-token: write          # OIDC token for Trusted Publishing (replaces any secret)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${{ github.event.release.tag_name }}"
          tag_version="${tag#v}"                                   # strip leading "v"
          proj_version=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag=$tag_version  pyproject=$proj_version"
          if [ "$tag_version" != "$proj_version" ]; then
            echo "::error::Tag ($tag_version) != pyproject.toml ($proj_version). Bump pyproject.toml before tagging."
            exit 1
          fi
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

name: 🐛 Bug report
description: Report a problem so it can be fixed
title: "[Bug]: "
labels: ["type: bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe the unexpected behavior...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The exact commands or actions that trigger the bug.
      placeholder: |
        1. Run `ctxmem init`
        2. Run `ctxmem recall "..."`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ctxmem version
      description: Output of `ctxmem status` (or the git commit you are on).
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 14 / Windows 11"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Search mode
      options:
        - keyword
        - semantic (beta)
        - hybrid (beta)
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant error output. This will be formatted as code.
      render: shell
    validations:
      required: false
